name: VeilNodeiOS
options:
  bundleIdPrefix: org.veilnode
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: false
targets:
  VeilNodeiOS:
    type: application
    platform: iOS
    productName: VeilNode
    sources:
      - VeilNodeiOSApp.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.veilnode.suite.ios
        PRODUCT_NAME: VeilNode
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: VeilNode
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: VeilNode
        CFBundleShortVersionString: "0.3.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
schemes:
  VeilNodeiOS:
    build:
      targets:
        VeilNodeiOS: all
    run:
      config: Debug
    archive:
      config: Release
